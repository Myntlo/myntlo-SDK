name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run lint

  typecheck:
    name: Type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npx tsc --noEmit

  secret-scan:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # OSS gitleaks image directly, not the gitleaks-action marketplace
      # wrapper (requires a paid license for org accounts). Pinned to
      # v8.21.2, NOT :latest - verified locally that gitleaks 8.30.1 has a
      # real detection regression (confirmed via a source build, not just
      # the published binary) where several rules, including the critical
      # private-key rule, silently produce zero findings on content their
      # own regex correctly matches. Re-verify detection still works (e.g.
      # against a throwaway repo with a fake PEM block) before bumping this.
      - name: Run gitleaks
        run: |
          docker run --rm -v "$(pwd):/repo" zricethezav/gitleaks:v8.21.2 detect \
            --source /repo --redact --exit-code 1

  test:
    name: Test (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - run: npm ci

      - run: npm test -- --coverage

      - name: Upload coverage
        if: matrix.node == 20
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          retention-days: 7

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run build

      - name: Verify dist exports (CJS)
        run: node -e "const sdk = require('./dist/index.js'); if (!sdk.MyntloClient) throw new Error('MyntloClient not exported')"

      - name: Verify dist exports (ESM)
        run: node --input-type=module -e "import * as sdk from './dist/index.mjs'; if (!sdk.MyntloClient) throw new Error('MyntloClient not exported')"

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7
