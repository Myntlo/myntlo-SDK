name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run lint

  typecheck:
    name: Type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npx tsc --noEmit

  secret-scan:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # OSS gitleaks image directly, not the gitleaks-action marketplace
      # wrapper (requires a paid license for org accounts). Pinned to
      # v8.21.2, NOT :latest - verified locally that gitleaks 8.30.1 has a
      # real detection regression (confirmed via a source build, not just
      # the published binary) where several rules, including the critical
      # private-key rule, silently produce zero findings on content their
      # own regex correctly matches. Re-verify detection still works (e.g.
      # against a throwaway repo with a fake PEM block) before bumping this.
      # Pinned by digest, not just the v8.21.2 tag - a compromised
      # zricethezav Docker Hub account could otherwise move the tag to a
      # different image. Digest covers the same multi-arch manifest as
      # v8.21.2 (verified via the Docker Hub API on 2026-07-18).
      - name: Run gitleaks
        run: |
          docker run --rm -v "$(pwd):/repo" zricethezav/gitleaks@sha256:0e99e8821643ea5b235718642b93bb32486af9c8162c8b8731f7cbdc951a7f46 detect \
            --source /repo --redact --exit-code 1

  security:
    name: Security audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # Blocking on production deps only, not the main Myntlo repo's
      # unqualified pattern - this SDK has zero runtime dependencies
      # (re-confirmed 2026-07-18: npm audit --omit=dev shows 0
      # vulnerabilities), so every current finding is in the dev tooling
      # chain (eslint/vitest/tsup), never shipped to consumers. Gating on
      # that would fail CI on dev-tooling noise instead of real risk.
      # Full picture (incl. dev deps) still surfaces below, non-blocking.
      - run: npm audit --omit=dev --audit-level=high

      - name: Audit including devDependencies (advisory, non-blocking)
        run: npm audit --audit-level=moderate
        continue-on-error: true

  test:
    name: Test (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - run: npm ci

      - run: npm test -- --coverage

      - name: Upload coverage
        if: matrix.node == 20
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          retention-days: 7

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run build

      - name: Verify dist exports (CJS)
        run: node -e "const sdk = require('./dist/index.js'); if (!sdk.MyntloClient) throw new Error('MyntloClient not exported')"

      - name: Verify dist exports (ESM)
        run: node --input-type=module -e "import * as sdk from './dist/index.mjs'; if (!sdk.MyntloClient) throw new Error('MyntloClient not exported')"

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7
