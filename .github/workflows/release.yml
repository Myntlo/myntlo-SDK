name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  id-token: write  # required for npm provenance

jobs:
  release:
    name: Publish to npm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: https://registry.npmjs.org

      - run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Verify dist exports
        run: node -e "const sdk = require('./dist/index.js'); if (!sdk.MyntloClient) throw new Error('MyntloClient not exported')"

      - name: Publish
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        # Pinned to a commit SHA, not the mutable v2 tag - a compromised
        # maintainer account could otherwise move the tag to malicious code
        # that runs with this job's contents:write/id-token:write access.
        # SHA corresponds to v2.6.2 as of 2026-07-18.
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          generate_release_notes: true
          files: |
            dist/index.js
            dist/index.mjs
            dist/index.d.ts
